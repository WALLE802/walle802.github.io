<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAROMEGA · Ventas</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-logo">
            <div class="login-brand">MAROMEGA</div>
            <p class="login-subtitle">Ventas Telefónicas</p>
        </div>
        <form id="loginForm" class="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username" autocomplete="username"
                       placeholder="Ingresá tu usuario" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" autocomplete="current-password"
                           placeholder="Ingresá tu contraseña" required>
                    <button type="button" class="toggle-pass" onclick="togglePassword()" tabindex="-1">👁</button>
                </div>
            </div>
            <div class="form-group" id="tokenGroup">
                <label for="ghToken" style="display:flex;justify-content:space-between;align-items:center">
                    <span>🔑 Token de acceso</span>
                    <span id="tokenStatus" style="font-size:11px;color:#2e7d32;font-weight:normal"></span>
                </label>
                <input type="password" id="ghToken" placeholder="github_pat_... (dejar vacío si ya está guardado)" autocomplete="off" autocorrect="off" spellcheck="false">
                <button type="button" id="clearTokenBtn" onclick="clearToken()" style="display:none;margin-top:4px;font-size:11px;color:#c62828;background:none;border:none;cursor:pointer;padding:0">✕ Borrar token guardado</button>
            </div>
            <button type="submit" class="btn-primary" id="loginBtn">
                <span id="loginBtnText">Ingresar</span>
                <span id="loginBtnSpinner" class="spinner hidden"></span>
            </button>
            <p id="loginError" class="error-msg hidden"></p>
        </form>
    </div>

    <script src="js/config.js?v=2"></script>
    <script src="js/auth.js?v=2"></script>
    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const btnText = document.getElementById('loginBtnText');
            const spinner = document.getElementById('loginBtnSpinner');
            const errorEl = document.getElementById('loginError');

            btn.disabled = true;
            btnText.textContent = 'Verificando...';
            spinner.classList.remove('hidden');
            errorEl.classList.add('hidden');

            try {
                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value;
                await login(username, password);
                const tok = document.getElementById('ghToken').value.trim();
                if (tok) localStorage.setItem('vt_logs_token', tok);
                window.location.replace('app.html');
            } catch (err) {
                errorEl.textContent = err.message;
                errorEl.classList.remove('hidden');
                btn.disabled = false;
                btnText.textContent = 'Ingresar';
                spinner.classList.add('hidden');
            }
        }

        function togglePassword() {
            const input = document.getElementById('password');
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        function clearToken() {
            localStorage.removeItem('vt_logs_token');
            document.getElementById('tokenStatus').textContent = '';
            document.getElementById('clearTokenBtn').style.display = 'none';
            document.getElementById('ghToken').placeholder = 'github_pat_...';
        }

        // Mostrar estado del token guardado
        if (localStorage.getItem('vt_logs_token')) {
            document.getElementById('tokenStatus').textContent = '✅ guardado en este dispositivo';
            document.getElementById('clearTokenBtn').style.display = 'block';
            document.getElementById('ghToken').placeholder = 'Dejar vacío para usar el guardado';
        }

        // Redirect if already logged in
        if (getSession()) {
            window.location.replace('app.html');
        }
    </script>
</body>
</html>
